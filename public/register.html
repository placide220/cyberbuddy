<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="Create your CyberBuddy account">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>CyberBuddy - Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#050a0f;--cyan:#00f5ff;--green:#00ff88;--red:#ff3860;--text:#c8e6f0;--dim:#4a7a8a;--border:#1a3a4a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Exo 2",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background-image:linear-gradient(rgba(0,245,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.015) 1px,transparent 1px);background-size:40px 40px;}
.card{background:rgba(10,21,32,0.95);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:100%;max-width:420px;}
.logo{font-family:"Orbitron",monospace;font-size:24px;font-weight:900;background:linear-gradient(90deg,#00f5ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;}
.subtitle{text-align:center;font-family:"Share Tech Mono",monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:28px;}
.error-msg{background:rgba(255,56,96,0.1);border:1px solid rgba(255,56,96,0.3);border-radius:8px;padding:10px 14px;font-family:"Share Tech Mono",monospace;font-size:12px;color:#ff6b8a;margin-bottom:16px;display:none;}
.field{margin-bottom:14px;}
.field label{display:flex;justify-content:space-between;font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:7px;}
.field label span{font-size:10px;color:var(--dim);letter-spacing:0;font-weight:normal;}
.pw-wrap{position:relative;}
.field input{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:9px;padding:13px 44px 13px 14px;color:var(--text);font-family:"Share Tech Mono",monospace;font-size:14px;outline:none;transition:border-color 0.2s;}
.field input.no-icon{padding-right:14px;}
.field input:focus{border-color:var(--cyan);}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--dim);font-size:18px;padding:4px;line-height:1;transition:color 0.2s;}
.eye-btn:hover{color:var(--cyan);}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--cyan),var(--green));border:none;border-radius:9px;color:#050a0f;font-family:"Orbitron",monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-top:4px;}
.btn:hover{transform:translateY(-1px);box-shadow:0 0 20px rgba(0,245,255,0.3);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:2px;}
.google-btn{width:100%;padding:12px;background:#fff;border:none;border-radius:9px;font-family:"Exo 2",sans-serif;font-size:13px;font-weight:600;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;margin-bottom:4px;}
.google-btn:hover{background:#f1f1f1;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.google-btn svg{width:18px;height:18px;}
.link{text-align:center;font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--dim);margin-top:18px;}
.link a{color:var(--cyan);text-decoration:none;}
.footer{margin-top:16px;text-align:center;font-family:"Share Tech Mono",monospace;font-size:10px;color:#1a3a4a;}
.footer a{color:#1a3a4a;text-decoration:none;margin:0 8px;}
@media(max-width:480px){.card{padding:28px 20px;}.logo{font-size:20px;}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🛡️ CYBERBUDDY</div>
  <div class="subtitle">// CREATE ACCOUNT //</div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- Google -->
  <button class="google-btn" onclick="window.location.href='/auth/google'">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <div class="divider"><span>OR</span></div>

  <div class="field">
    <label>USERNAME</label>
    <input type="text" id="username" placeholder="Choose a username" class="no-icon" autocomplete="username" onkeydown="if(event.key==='Enter')register()"/>
  </div>
  <div class="field">
    <label>EMAIL</label>
    <input type="email" id="email" placeholder="your@email.com" class="no-icon" autocomplete="email" onkeydown="if(event.key==='Enter')register()"/>
  </div>
  <div class="field">
    <label>PASSWORD <span>min 6 characters</span></label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Create a password" autocomplete="new-password" onkeydown="if(event.key==='Enter')register()"/>
      <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePw()">👁️</button>
    </div>
  </div>
  <div class="field">
    <label>REFERRAL CODE <span>optional — get +10 bonus points</span></label>
    <input type="text" id="referral" placeholder="Enter a friend's code e.g. AB12CD" class="no-icon" oninput="this.value=this.value.toUpperCase()"/>
  </div>

  <button class="btn" id="regBtn" onclick="register()">CREATE ACCOUNT</button>

  
<div style="text-align:center;margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#2a4a5a;line-height:2;">
  By creating an account you agree to our<br>
  <a href="/terms" style="color:#4a7a8a;text-decoration:none;" target="_blank">Terms of Service</a>
  &nbsp;·&nbsp;
  <a href="/privacy" style="color:#4a7a8a;text-decoration:none;" target="_blank">Privacy Policy</a>
</div>
  <div class="link">Already registered? <a href="/login">Login here</a></div>
</div>

<div class="footer">
  <a href="/terms">Terms of Service</a>
  <a href="/privacy">Privacy Policy</a>
</div>

<script>
function togglePw(){
  const inp = document.getElementById("password");
  const btn = document.getElementById("eyeBtn");
  if(inp.type === "password"){ inp.type = "text"; btn.textContent = "🙈"; }
  else { inp.type = "password"; btn.textContent = "👁️"; }
}

function showError(msg){
  const e = document.getElementById("errorMsg");
  e.textContent = msg;
  e.style.display = "block";
}

async function register(){
  const username = document.getElementById("username").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const referral = document.getElementById("referral").value.trim() || null;
  const btn      = document.getElementById("regBtn");
  document.getElementById("errorMsg").style.display = "none";
  if(!username || !email || !password){ showError("All fields are required."); return; }
  if(password.length < 6){ showError("Password must be at least 6 characters."); return; }
  btn.disabled = true; btn.textContent = "CREATING...";
  try{
    const res  = await fetch("/api/auth/register", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password, referral })
    });
    const data = await res.json();
    if(data.error){
      showError(data.error);
      btn.disabled = false; btn.textContent = "CREATE ACCOUNT";
      return;
    }
    // Small delay then redirect — ensures session cookie is saved
    setTimeout(() => { window.location.replace("/chat"); }, 300);
  } catch(e){
    showError("Connection error. Please try again.");
    btn.disabled = false; btn.textContent = "CREATE ACCOUNT";
  }
}
</script>
</body>
</html>
