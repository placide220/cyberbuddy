<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <meta property="og:image" content="/favicon.svg">  <meta property="og:title" content="CyberBuddy - Secure Login">
  <meta property="og:description" content="AI-powered cybersecurity education for students">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cyberbuddy.rw">
  <meta property="og:image" content="https://cyberbuddy.rw/favicon.svg">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="CyberBuddy - Secure Login">
  <meta name="twitter:description" content="AI-powered cybersecurity education for students">
  <meta name="description" content="AI-powered cybersecurity education for students">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberBuddy - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#050a0f;--cyan:#00f5ff;--green:#00ff88;--text:#c8e6f0;--text-dim:#4a7a8a;--border:#1a3a4a;--red:#ff3860;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Exo 2",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:linear-gradient(rgba(0,245,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.02) 1px,transparent 1px);background-size:40px 40px;}
.card{width:100%;max-width:420px;padding:40px 36px;background:rgba(10,21,32,0.95);border:1px solid var(--border);border-radius:16px;}
.logo{font-family:"Orbitron",monospace;font-size:28px;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,#00f5ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;filter:drop-shadow(0 0 12px rgba(0,245,255,0.3));}
.subtitle{text-align:center;font-family:"Share Tech Mono",monospace;color:var(--text-dim);font-size:11px;letter-spacing:2px;margin:6px 0 32px;}
.field{margin-bottom:18px;}
label{display:block;font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:2px;color:var(--cyan);margin-bottom:7px;}
input{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:"Share Tech Mono",monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,245,255,0.08);}
input::placeholder{color:var(--text-dim);}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--cyan),var(--green));border:none;border-radius:8px;color:#050a0f;font-family:"Orbitron",monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin-top:6px;}
.btn:hover{transform:translateY(-1px);box-shadow:0 0 20px rgba(0,245,255,0.3);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.error{background:rgba(255,56,96,0.1);border:1px solid rgba(255,56,96,0.3);border-radius:6px;padding:10px 14px;font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--red);margin-bottom:16px;display:none;}
.link{text-align:center;margin-top:20px;font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--text-dim);}
.link a{color:var(--cyan);text-decoration:none;}
hr{border:none;border-top:1px solid var(--border);margin:24px 0;}

/* ── MOBILE RESPONSIVE ──────────────────────────────── */
@media(max-width:640px){
  body{padding:12px;}
  .nav{padding:10px 14px;margin-bottom:16px;flex-wrap:wrap;gap:6px;}
  .nav-links{display:flex;flex-wrap:wrap;gap:6px;}
  .nav-links a{margin-left:0;}
  .grid2,.stats-grid{grid-template-columns:1fr !important;}
  .cards{grid-template-columns:1fr !important;}
  .quiz-grid{grid-template-columns:1fr !important;}
  .input-row{flex-direction:column;}
  .scan-btn{width:100% !important;}
  .url-input{font-size:16px;}
  .score-card{grid-template-columns:1fr !important;text-align:center;}
  .months-grid{grid-template-columns:1fr 1fr 1fr;}
  .modal{margin:10px;max-width:calc(100vw - 20px);}
  .tabs{flex-wrap:wrap;}
  .tab{font-size:10px;padding:8px 10px;}
  .board{max-width:100%;}
  table{font-size:12px;}
  .tbl th,.tbl td{padding:8px 6px;}
  h1,.hero-title,.page-title{font-size:18px !important;}
  .plan-price{font-size:30px !important;}
}
@media(max-width:380px){
  .nav-links a{font-size:10px;}
  .bubble{max-width:92%;}
}


@media(max-width:480px){
  body{padding:16px;}
  .card{padding:24px 18px;}
  .logo{font-size:20px;}
  input{font-size:16px;padding:13px 14px;}
  .btn{font-size:13px;padding:14px;}
}

.divider{display:flex;align-items:center;gap:12px;margin:16px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:2px;}
.google-btn{width:100%;padding:12px;background:#fff;border:none;border-radius:8px;font-family:"Exo 2",sans-serif;font-size:13px;font-weight:600;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;margin-bottom:8px;}
.google-btn:hover{background:#f5f5f5;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.google-btn svg{width:18px;height:18px;flex-shrink:0;}
.error-notice{background:rgba(255,56,96,0.1);border:1px solid rgba(255,56,96,0.3);border-radius:8px;padding:10px;font-family:"Share Tech Mono",monospace;font-size:11px;color:#ff6b8a;margin-bottom:12px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">CYBERBUDDY</div>
  <div class="subtitle">// SECURE LOGIN //</div>
  <div class="error" id="errorMsg"></div>
  
  <!-- Google Login -->
  <div id="googleError" class="error-notice"></div>
  <button class="google-btn" onclick="window.location='/auth/google'">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
  <div class="divider"><span>OR</span></div>
  <div class="field"><label>EMAIL</label><input type="email" id="email" placeholder="student@school.com"/></div>
  <div class="field"><label>PASSWORD</label><input type="password" id="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/></div>
  <button class="btn" id="loginBtn" onclick="login()">LOGIN</button>
  <hr>
  <div class="link"><a href="/forgot-password" style="display:block;text-align:center;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);margin-bottom:14px;text-decoration:none;">Forgot password?</a>
        No account? <a href="/register">Register here</a></div>
</div>
<script>
async function login(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  const btn=document.getElementById("loginBtn");
  document.getElementById("errorMsg").style.display="none";
  if(!email||!password){showError("Please fill in all fields.");return;}
  btn.disabled=true;btn.textContent="LOGGING IN...";
  try{
    const res=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(data.error){showError(data.error);btn.disabled=false;btn.textContent="LOGIN";return;}
    window.location.href="/chat";
  }catch(e){showError("Connection error. Is the server running?");btn.disabled=false;btn.textContent="LOGIN";}
}
function showError(msg){const e=document.getElementById("errorMsg");e.textContent=msg;e.style.display="block";}

// Check for Google error
(()=>{
  const p = new URLSearchParams(location.search);
  const err = p.get("error");
  if(err === "google_not_configured"){
    const el = document.getElementById("googleError");
    el.textContent = "Google login not configured yet. Use email/password below.";
    el.style.display = "block";
  }
})();
</script>
<div style="text-align:center;padding:16px;font-family:Share Tech Mono,monospace;font-size:10px;color:#2a4a5a;"><a href="/terms" style="color:#2a4a5a;text-decoration:none;margin-right:12px">Terms of Service</a><a href="/privacy" style="color:#2a4a5a;text-decoration:none;">Privacy Policy</a></div>
</body></html>
