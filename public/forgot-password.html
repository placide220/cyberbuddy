<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="Reset your CyberBuddy password">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>CyberBuddy - Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#050a0f;--cyan:#00f5ff;--green:#00ff88;--red:#ff3860;--text:#c8e6f0;--dim:#4a7a8a;--border:#1a3a4a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Exo 2",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background-image:linear-gradient(rgba(0,245,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.015) 1px,transparent 1px);background-size:40px 40px;}
.card{background:rgba(10,21,32,0.95);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:100%;max-width:420px;}
.logo{font-family:"Orbitron",monospace;font-size:22px;font-weight:900;background:linear-gradient(90deg,#00f5ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;}
.subtitle{text-align:center;font-family:"Share Tech Mono",monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:10px;}
.desc{text-align:center;font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.6;}
.msg{padding:12px 14px;border-radius:8px;font-family:"Share Tech Mono",monospace;font-size:12px;margin-bottom:14px;display:none;line-height:1.6;}
.msg.ok{background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.3);color:var(--green);}
.msg.err{background:rgba(255,56,96,0.08);border:1px solid rgba(255,56,96,0.3);color:#ff6b8a;}
.field{margin-bottom:16px;}
.field label{display:block;font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:7px;}
.field input{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:9px;padding:13px 14px;color:var(--text);font-family:"Share Tech Mono",monospace;font-size:14px;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--cyan);}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--cyan),var(--green));border:none;border-radius:9px;color:#050a0f;font-family:"Orbitron",monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 0 20px rgba(0,245,255,0.3);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.link{text-align:center;font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--dim);margin-top:20px;}
.link a{color:var(--cyan);text-decoration:none;}
.reset-link-box{background:rgba(0,245,255,0.06);border:1px solid rgba(0,245,255,0.2);border-radius:8px;padding:14px;margin-top:10px;display:none;}
.reset-link-box p{font-family:"Share Tech Mono",monospace;font-size:11px;color:var(--dim);margin-bottom:10px;}
.reset-link-box a{display:block;background:linear-gradient(135deg,var(--cyan),var(--green));color:#050a0f;text-align:center;padding:11px;border-radius:8px;font-family:"Orbitron",monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-decoration:none;}
@media(max-width:480px){.card{padding:28px 20px;}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🛡️ CYBERBUDDY</div>
  <div class="subtitle">// FORGOT PASSWORD //</div>
  <div class="desc">Enter your email address and we'll send you a link to reset your password.</div>

  <div class="msg" id="msg"></div>
  <div class="reset-link-box" id="resetLinkBox">
    <p>Email sending failed. Click the button below to reset your password directly:</p>
    <a href="#" id="resetDirectLink">RESET MY PASSWORD →</a>
  </div>

  <div id="formSection">
    <div class="field">
      <label>EMAIL ADDRESS</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')submit()"/>
    </div>
    <button class="btn" id="submitBtn" onclick="submit()">SEND RESET LINK</button>
  </div>

  <div class="link"><a href="/login">← Back to Login</a></div>
</div>

<script>
async function submit() {
  const email = document.getElementById("email").value.trim();
  const btn   = document.getElementById("submitBtn");
  const msg   = document.getElementById("msg");
  msg.style.display = "none";
  document.getElementById("resetLinkBox").style.display = "none";

  if (!email) { showMsg("err", "Please enter your email address."); return; }

  btn.disabled = true; btn.textContent = "SENDING...";

  try {
    const res  = await fetch("/api/auth/forgot-password", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    btn.disabled = false; btn.textContent = "SEND RESET LINK";

    if (data.error) {
      showMsg("err", data.error);
      return;
    }

    // If email failed but we got a direct link
    if (data.resetLink) {
      showMsg("ok", "✅ Your account was found! Email sending failed but you can reset directly:");
      const box = document.getElementById("resetLinkBox");
      document.getElementById("resetDirectLink").href = data.resetLink;
      box.style.display = "block";
      // Hide the form
      document.getElementById("formSection").style.display = "none";
      return;
    }

    // Email sent successfully
    showMsg("ok", "✅ Reset link sent! Check your inbox and spam folder.\n\nThe link expires in 1 hour.");
    document.getElementById("formSection").style.display = "none";

  } catch(e) {
    btn.disabled = false; btn.textContent = "SEND RESET LINK";
    showMsg("err", "Connection error. Please try again.");
  }
}

function showMsg(type, text) {
  const el = document.getElementById("msg");
  el.className = "msg " + type;
  el.textContent = text;
  el.style.display = "block";
}
</script>
</body>
</html>
