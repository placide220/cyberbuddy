<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <meta property="og:image" content="/favicon.svg"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>CyberBuddy - Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#050a0f;--cyan:#00f5ff;--green:#00ff88;--red:#ff3860;--text:#c8e6f0;--dim:#4a7a8a;--border:#1a3a4a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"Exo 2",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:linear-gradient(rgba(0,245,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.015) 1px,transparent 1px);background-size:40px 40px;}
.card{background:rgba(10,21,32,0.95);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:420px;}
.logo{font-family:"Orbitron",monospace;font-size:22px;font-weight:900;background:linear-gradient(90deg,#00f5ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:6px;}
.sub{text-align:center;font-family:"Share Tech Mono",monospace;font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:28px;}
label{display:block;font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:6px;}
input{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:"Share Tech Mono",monospace;font-size:13px;outline:none;margin-bottom:16px;}
input:focus{border-color:var(--cyan);}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:"Orbitron",monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;background:linear-gradient(135deg,var(--cyan),var(--green));color:#050a0f;transition:all 0.2s;margin-bottom:12px;}
.btn:hover{transform:translateY(-1px);}
.msg{padding:10px 14px;border-radius:8px;font-family:"Share Tech Mono",monospace;font-size:12px;margin-bottom:14px;display:none;}
.msg.ok{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--green);}
.msg.err{background:rgba(255,56,96,0.1);border:1px solid rgba(255,56,96,0.3);color:var(--red);}
.link{text-align:center;font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--dim);}
.link a{color:var(--cyan);text-decoration:none;}

/* ── MOBILE RESPONSIVE ──────────────────────────────── */
@media(max-width:640px){
  body{padding:12px;}
  .nav{padding:10px 14px;margin-bottom:16px;flex-wrap:wrap;gap:6px;}
  .nav-links{display:flex;flex-wrap:wrap;gap:6px;}
  .nav-links a{margin-left:0;}
  .grid2,.stats-grid{grid-template-columns:1fr !important;}
  .cards{grid-template-columns:1fr !important;}
  .quiz-grid{grid-template-columns:1fr !important;}
  .input-row{flex-direction:column;}
  .scan-btn{width:100% !important;}
  .url-input{font-size:16px;}
  .score-card{grid-template-columns:1fr !important;text-align:center;}
  .months-grid{grid-template-columns:1fr 1fr 1fr;}
  .modal{margin:10px;max-width:calc(100vw - 20px);}
  .tabs{flex-wrap:wrap;}
  .tab{font-size:10px;padding:8px 10px;}
  .board{max-width:100%;}
  table{font-size:12px;}
  .tbl th,.tbl td{padding:8px 6px;}
  h1,.hero-title,.page-title{font-size:18px !important;}
  .plan-price{font-size:30px !important;}
}
@media(max-width:380px){
  .nav-links a{font-size:10px;}
  .bubble{max-width:92%;}
}


@media(max-width:480px){
  body{padding:16px;}
  .card{padding:24px 18px;}
  .logo{font-size:20px;}
  input{font-size:16px;padding:13px 14px;}
  .btn{font-size:13px;padding:14px;}
}

.pw-wrap{position:relative;}
.pw-wrap input{width:100%;padding-right:44px;}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--dim);font-size:17px;padding:4px;transition:color 0.2s;line-height:1;}
.eye-btn:hover{color:var(--cyan);}

</style></head>
<body>
<div class="card">
  <div class="logo">CYBERBUDDY</div>
  <div class="sub">// RESET PASSWORD //</div>
  <div id="msg" class="msg"></div>
  <div id="resetForm">
    <label>NEW PASSWORD</label>
    <div class="pw-wrap"><input type="password" id="pw1" placeholder="Min 6 characters"/><button type="button" class="eye-btn" onclick="togglePw(\'pw1\',this)" tabindex="-1">👁️</button></div>
    <label>CONFIRM PASSWORD</label>
    <div class="pw-wrap"><input type="password" id="pw2" placeholder="Repeat password"/><button type="button" class="eye-btn" onclick="togglePw(\'pw2\',this)" tabindex="-1">👁️</button></div>
    <button class="btn" onclick="reset()">SET NEW PASSWORD</button>
  </div>
  <div class="link"><a href="/login">← Back to Login</a></div>
</div>
<script>
const token = new URLSearchParams(window.location.search).get("token");
if (!token) { document.getElementById("msg").className="msg err"; document.getElementById("msg").textContent="Invalid reset link."; document.getElementById("msg").style.display="block"; document.getElementById("resetForm").style.display="none"; }
async function reset() {
  const pw1 = document.getElementById("pw1").value;
  const pw2 = document.getElementById("pw2").value;
  const msg = document.getElementById("msg");
  if (pw1 !== pw2) { msg.className="msg err"; msg.textContent="Passwords do not match."; msg.style.display="block"; return; }
  if (pw1.length < 6) { msg.className="msg err"; msg.textContent="Password too short."; msg.style.display="block"; return; }
  const data = await fetch("/api/auth/reset-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,newPassword:pw1})}).then(r=>r.json());
  msg.className = data.error ? "msg err" : "msg ok";
  msg.textContent = data.error || "Password updated! Redirecting to login...";
  msg.style.display = "block";
  if (!data.error) setTimeout(()=>window.location.href="/login",2000);
}

function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '🙈';
  } else {
    inp.type = 'password';
    btn.textContent = '👁️';
  }
}

</script>
</body></html>
